name: DingTalk Test

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Send test to DingTalk
        run: |
          curl -H "Content-Type: application/json" \
               -d '{
                 "msgtype": "text",
                 "text": {
                   "content": "【TrendRadar 测试】\n配置成功！\nWebhook 正常工作。\n时间：$(date +%Y-%m-%d\ %H:%M:%S)"
                 }
               }' \
               ${{ secrets.DINGTALK_WEBHOOK_URL }}
